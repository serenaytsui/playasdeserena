<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amarante&display=swap" rel="stylesheet">
  </head>
  <body>
    <p> These are some of the photos that I have taken over the years of the beach in front of my apartment in San Juan.</p>
    <div class="carousel">
      <div class="group">
        <img class="photos" src="images/IMG_0118.JPG" ></img>
        <img class="photos" src="images/IMG_2545.JPG" ></img>
        <img class="photos" src="images/IMG_4732.jpeg"></img>
        <img class="photos" src="images/IMG_7169.jpg"></img>
        <img class="photos" src="images/IMG_0118.JPG" ></img>
        <img class="photos" src="images/IMG_2545.JPG" ></img>
        <img class="photos" src="images/IMG_4732.jpeg"></img>
        <img class="photos" src="images/IMG_7169.jpg"></img>
      </div>
    </div>
    <div class="test" src="images/IMG_0013.JPG"></div>
    </body>
    
    <script src="index.js"></script>

    
  </body>
  <style>
      .amarante-regular {
     font-family: "Amarante", serif;
     font-weight: 400;
     font-style: normal;}

      body{ background: #043545;
      background: rgba(204, 245, 255, 1);}

      p{font-family: "Amarante";
        font-size: 30px;
        align-content: center;}

      .carousel {
        margin: 0%;
        width: 100%;
        border: none;
        display:flex;
        overflow-x: auto;
      }
      .carousel::-webkit-scrollbar {display: none;}
      .group{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1em;
        animation: spin 45s infinite linear;
        padding: 1em;
      }
      .photos{
        /*flex:0 0 5em;*/
        height: 75vh;
        padding: 1em;
      }
      .carousel::-webkit-scrollbar {
        display:none;
      }
      @keyframes spin{
        from {translate: 0;}
        to {translate:-50%}

      }
    </style>
</html>
